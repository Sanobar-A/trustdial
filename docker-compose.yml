services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - rabbitmq

  worker:
    build: ./worker
    depends_on:
      - rabbitmq

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: trustdial
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"